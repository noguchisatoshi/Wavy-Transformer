# config.yaml
model:
  vocab_size: 30522
  hidden_size: 768
  intermediate_size: 3072
  num_hidden_layers: 12
  num_attention_heads: 12
  max_position_embeddings: 512
  dropout_prob: 0.1
  residual_type: "mix_simp" # "diffuse" または "wave"
  use_sparse_attention: false # Sparse Attention を利用する場合は true
  window_size: 4 # Sparse Attention 用のウィンドウサイズ
  tau: 0.5
  add_mass: false

training:
  max_seq_length: 512 # 事前学習時のシークエンス長
  per_device_batch_size: 32
  gradient_accumulation_steps: 2  # 2/2GPU　　　!!!確認!!!
  num_epochs: 40
  learning_rate: 0.00005
  max_steps: 100000
  save_dir: "/workspace/nas/oversmooth_bert/bert_checkpoints/tau=0.5_oscillator_v3_Chain"
  log_save_dir: "/workspace/nas/oversmooth_bert/logs/tau=0.5_oscillator_v3_Chain"

data:
  file_path: "datasets/pretraining/data_100000.txt" # フルデータ用ファイル（常に書き出す）
  dupe_factor: 3
  short_seq_prob: 0.1
  masked_lm_prob: 0.15
  max_predictions_per_seq: 20
  nsp_neg_prob: 0.5
  max_documents: 100000
  persistent_cache_path: "/workspace/nas/oversmooth_bert/datasets/pretraining/preprocessed_dataset_100000_2.pkl"

random_seed: 42

small_experiment: false
